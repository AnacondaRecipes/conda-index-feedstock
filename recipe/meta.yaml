{% set name = "conda-index" %}
{% set version = "0.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/conda/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 2c3c223dea4dd4aa921e5f8f9fe72326cb7baaa561dbf1f0d842e4d6a2db3226

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  host:
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
    - python
    - pip
  run:
    - python
    - click >=8
    - conda >=25
    - conda-package-streaming >=0.12.0
    - filelock
    - jinja2
    # https://github.com/conda/conda-index/blob/0.7.0/recipe/meta.yaml#L31
    - msgpack-python >=1.0.2
    - ruamel.yaml
    - zstandard
  run_constrained:
    - conda-package-handling >=1.9.0

test:
  imports:
    - conda_index.index
  requires:
    - pip
  commands:
    - pip check
    - python -m conda_index --help

about:
  home: https://github.com/conda/conda-index
  summary: Create `repodata.json` for collections of conda packages.
  description: |
    Create repodata.json for collections of conda packages.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://conda.github.io/conda-index
  dev_url: https://github.com/conda/conda-index

extra:
  recipe-maintainers:
    - AndresGuzman-Ballen
    - dholth
    - jharlow-intel
    - kenodegard
